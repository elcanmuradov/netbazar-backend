databaseChangeLog:
  - changeSet:
      id: 3_seller_username
      author: swaply
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: sellers
            columnName: name
      changes:
        - addColumn:
            tableName: sellers
            columns:
              - column:
                  name: username
                  type: VARCHAR(100)
                  constraints:
                    nullable: true

        - sql:
            sql: >
              UPDATE sellers 
              SET username = CASE 
                WHEN EXISTS (SELECT 1 FROM sellers s2 WHERE s2.name = sellers.name AND s2.id != sellers.id)
                THEN name || '_' || SUBSTRING(id::text, 1, 8)
                ELSE name
              END
            dbms: postgresql

        - addUniqueConstraint:
            tableName: sellers
            columnNames: username
            constraintName: sellers_username_key
        
        - addNotNullConstraint:
            tableName: sellers
            columnName: username
            columnDataType: VARCHAR(100)
