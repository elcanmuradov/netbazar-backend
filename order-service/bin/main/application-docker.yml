spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:order-db}:${POSTGRES_PORT:5432}/${POSTGRES_DB:order_service}
    username: ${POSTGRES_USER:admin}
    password: ${POSTGRES_PASSWORD:secret123}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yml

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
