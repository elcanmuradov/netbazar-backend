spring:
  datasource:
    # ✅ Docker network içinde postgres servis adına bağlan
    url: jdbc:postgresql://media-db:5432/media_service
    username: admin
    password: secret123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect