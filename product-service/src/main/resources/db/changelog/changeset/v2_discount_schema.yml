databaseChangeLog:
  - changeSet:
      id: 5
      author: antigravity
      preConditions:
        - onFail: MARK_RAN
          not:
            - tableExists:
                tableName: discount_rules
      changes:
        - createTable:
            tableName: discount_rules
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: code
                  type: VARCHAR(100)
                  constraints:
                    unique: true
              - column:
                  name: type
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: value
                  type: DECIMAL(12,2)
                  constraints:
                    nullable: false
              - column:
                  name: min_order_amount
                  type: DECIMAL(12,2)
              - column:
                  name: max_discount_amount
                  type: DECIMAL(12,2)
              - column:
                  name: min_quantity
                  type: INTEGER
              - column:
                  name: start_date
                  type: TIMESTAMP
              - column:
                  name: end_date
                  type: TIMESTAMP
              - column:
                  name: usage_limit
                  type: INTEGER
              - column:
                  name: usage_count
                  type: INTEGER
                  defaultValue: 0
              - column:
                  name: seller_id
                  type: UUID
              - column:
                  name: product_id
                  type: UUID
              - column:
                  name: is_active
                  type: BOOLEAN
                  defaultValue: true
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP

  - changeSet:
      id: 6
      author: antigravity
      preConditions:
        - onFail: MARK_RAN
          not:
            - columnExists:
                tableName: customer_orders
                columnName: discount_code
      changes:
        - addColumn:
            tableName: customer_orders
            columns:
              - column:
                  name: discount_code
                  type: VARCHAR(100)
              - column:
                  name: original_price
                  type: DECIMAL(12,2)
              - column:
                  name: discount_amount
                  type: DECIMAL(12,2)
                  defaultValue: 0

  - changeSet:
      id: 7
      author: antigravity
      preConditions:
        - onFail: MARK_RAN
          not:
            - columnExists:
                tableName: products
                columnName: report_count
      changes:
        - addColumn:
            tableName: products
            columns:
              - column:
                  name: report_count
                  type: INTEGER
                  defaultValue: 0
              - column:
                  name: deleted_at
                  type: TIMESTAMP
