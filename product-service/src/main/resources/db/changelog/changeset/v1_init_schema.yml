databaseChangeLog:
  - changeSet:
      id: 1
      author: antigravity
      preConditions:
        - onFail: MARK_RAN
          not:
            - tableExists:
                tableName: products
      changes:
        - createTable:
            tableName: products
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: price
                  type: DECIMAL(12, 2)
                  constraints:
                    nullable: false
              - column:
                  name: category
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: city
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: is_new
                  type: BOOLEAN
                  defaultValue: true
              - column:
                  name: is_delivery
                  type: BOOLEAN
                  defaultValue: false
              - column:
                  name: is_reported
                  type: BOOLEAN
                  defaultValue: false
              - column:
                  name: viewers
                  type: BIGINT
                  defaultValue: 0
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: ACTIVE
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP

  - changeSet:
      id: 2
      author: antigravity
      preConditions:
        - onFail: MARK_RAN
          not:
            - tableExists:
                tableName: product_images
      changes:
        - createTable:
            tableName: product_images
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: product_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_product_images_product
                    referencedTableName: products
                    referencedColumnNames: id
              - column:
                  name: image_url
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

  - changeSet:
      id: 3
      author: antigravity
      preConditions:
        - onFail: MARK_RAN
          not:
            - tableExists:
                tableName: product_reviews
      changes:
        - createTable:
            tableName: product_reviews
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: product_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: user_name
                  type: VARCHAR(255)
              - column:
                  name: rating
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: comment
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP

  - changeSet:
      id: 4
      author: antigravity
      preConditions:
        - onFail: MARK_RAN
          not:
            - tableExists:
                tableName: customer_orders
      changes:
        - createTable:
            tableName: customer_orders
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: buyer_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: seller_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: product_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: product_title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: total_price
                  type: DECIMAL(12, 2)
                  constraints:
                    nullable: false
              - column:
                  name: quantity
                  type: INTEGER
                  defaultValue: 1
                  constraints:
                    nullable: false
              - column:
                  name: payment_method
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: delivery_city
                  type: VARCHAR(100)
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
