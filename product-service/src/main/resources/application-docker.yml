spring:
  datasource:
    # ✅ Docker network içinde postgres servis adına bağlan
    url: jdbc:postgresql://product-db:5432/product_service
    username: admin
    password: secret123
    driver-class-name: org.postgresql.Driver
  elasticsearch:
    uris: http://elasticsearch:9200
  data:
    redis:
      host: redis
      port: 6379
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yml