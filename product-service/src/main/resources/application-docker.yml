spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:product-db}:${POSTGRES_PORT:5432}/${POSTGRES_DB:product_service}
    username: ${POSTGRES_USER:admin}
    password: ${POSTGRES_PASSWORD:secret123}
    driver-class-name: org.postgresql.Driver
  elasticsearch:
    uris: http://elasticsearch:9200
  data:
    redis:
      host: redis
      port: 6379
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yml